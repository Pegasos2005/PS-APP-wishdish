spring.application.name=backend

#----------------------------------------------------------------------
#           CONFIGURACION DE BASE DE DATOS - PROYECTO ACADEMICO
#----------------------------------------------------------------------
# Credenciales compartidas del equipo (toy project - no usar en produccion)
# Usuario MySQL: root
# Password MySQL: root
# Nombre BD: wishdish

# Conexi�n a la base de datos MySQL
# Esta l�nea hace que la comunicaci�n no est� cifrada de manera local. Si el sv da fallo descomentar.
# spring.datasource.url=jdbc:mysql://localhost:3306/wishdish?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3306/wishdish?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACION DE HIBERNATE (JPA)
# ===============================
# JPA genera las tablas automaticamente a partir de las entidades
# update: crea/actualiza tablas sin borrar datos existentes
spring.jpa.hibernate.ddl-auto=update

# Mostrar en la consola las consultas SQL que hace Java (util para debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

