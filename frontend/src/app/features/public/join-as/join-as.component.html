<div class="access-container">

  <div class="access-card">
    <h1 class="access-title">Join As</h1>

    <div class="button-group">
      <button
        class="access-button"
        (click)="joinAsAdmin()"
        aria-label="Join as Administrator">
        Admin
      </button>

      <button
        class="access-button"
        (click)="joinAsWorker()"
        aria-label="Join as Worker Staff">
        Worker
      </button>

      <button
        class="access-button"
        (click)="joinAsUser()"
        aria-label="Join as Customer">
        User
      </button>
    </div>

  </div>

</div>
