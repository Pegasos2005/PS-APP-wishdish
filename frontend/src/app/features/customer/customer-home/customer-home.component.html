<div class="home-background">

  <div class="table-badge">
    Table {{ orderService.tableId() || '?' }}
  </div>

  <!-- NUEVO: Botón de salida seguro arriba a la derecha -->
  <button class="secure-exit-btn" (click)="requestExit()">
    ← Go Back
  </button>

  <div class="overlay"></div>

  <main class="home-content">
    <header class="home-header">
      <img src="assets/logo.png" alt="logo" style="height: 40px;">
      <p class="welcome-text">Welcome! What would you like to do?</p>
    </header>

    <div class="action-group">
      <button class="home-button primary-action" (click)="startOrdering()">
        <span class="button-icon">🍽️</span>
        <span class="button-text">Start to order</span>
      </button>

      <button class="home-button secondary-action" (click)="watchOrders()">
        <span class="button-icon">🧾</span>
        <span class="button-text">Watch orders or pay</span>
      </button>
    </div>
  </main>

  <!-- NUEVO: Modal de Autorización de Staff -->
  @if (isExitModalOpen()) {
    <div class="modal-overlay">
      <div class="modal-card">
        <h2 class="modal-title">Staff Authorization</h2>

        <input #staffName type="text" class="table-input" [class.error-shake]="authError()" placeholder="Username" style="margin-bottom: 10px;" autofocus>
        <input #staffPin type="password" class="table-input" [class.error-shake]="authError()" placeholder="PIN" (keyup.enter)="confirmExit(staffName.value, staffPin.value)">

        @if (authError()) {
          <p class="error-text">Invalid credentials or insufficient permissions.</p>
        }

        <div class="modal-buttons">
          <button class="access-button confirm-btn" (click)="confirmExit(staffName.value, staffPin.value)">Authorize Exit</button>
          <button class="access-button cancel-btn" (click)="cancelExit()">Cancel</button>
        </div>
      </div>
    </div>
  }
</div>
