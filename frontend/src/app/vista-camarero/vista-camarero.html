<div class="principal-container">
  <header class="head">
    <img src="../../../assets/logo.png" alt="logo">
    <button class="return-button" routerLink="/">&lt;</button>
  </header>

  <div class="body-camarero">
    <div class="sub-header">Employee - ComandsList</div>

    <main class="content-area">
      <div class="grid-comandas">
        @for (comanda of comandas(); track comanda.id) {
        <section class="comanda-card" [class.comanda-amago-salida]="comanda.isExiting">
          <header class="comanda-header">
            <span>Comand: {{ comanda.id }} - Table: {{ comanda.numeroMesa }}</span>
            <button class="check-circle master-check"
                    [class.prepared]="isOrderComplete(comanda)"
                    (click)="toggleComandaCompleta(comanda)">
              @if (isOrderComplete(comanda)) { ✓ }
            </button>
          </header>

          <div class="dishes-grid">
            @for (item of comanda.items; track item.id) {
            <article class="dish-card" [class.item-prepared]="item.status === 'prepared'">
              <div class="dish-header">
                <span class="dish-name">{{ item.nombrePlato }}</span>
                <button class="check-circle"
                        [class.prepared]="item.status === 'prepared'"
                        (click)="marcarPlatoPreparado(comanda, item)">
                  @if (item.status === 'prepared') { ✓ }
                </button>
              </div>
              <ul class="comments-list">
                <li>• {{ item.notas || 'No notes' }}</li>
              </ul>
            </article>
            }
          </div>
        </section>
        }
      </div>
    </main>
  </div>
</div>
