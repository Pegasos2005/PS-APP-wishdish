<!-- Hacer que el producto se clickeable -->
<div class="product-card" (click)="onProductClick()">
  <img [src]="product.picture" alt="Photo of {{ product.name }}" class="dish-image">

  <div class="product-info">
    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>
    <span class="price">{{ product.price }} €</span>
  </div>

  <button class="add-btn" (click)="onAddClick($event)" aria-label="Add to order">+</button>
</div>
