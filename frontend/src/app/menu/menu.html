<div class="principal-container">

  <header class="head">
    <img src="../../../assets/logo.png" alt="logo">
    <button class="return-button">&lt;</button>
    <div class="image-logo"></div>
  </header>

  <div class="body-menu">

    <aside class="category-column">
      @for(category of menuCategories(); track category.categoryId){
        <button class="category-btn"
          [class.active]="selectedCategory === category.categoryId"
          (click)="scrollToCategory(category.categoryId)">
          {{ category.categoryName}}
        </button>
      }


      <button class="show-order-btn" routerLink="/summary">
        Show Order
        @if (orderService.totalItems() > 0) {
        <span class="cart-count">{{ orderService.totalItems() }}</span>
        }
      </button>

      <button class="waiter-view-btn" (click)="navigateToPedido()">
        Vista Camarero
      </button>
    </aside>

    <main class="product-column"
          #productColumn
          (scroll)="onScroll($event)">

      @for (category of menuCategories(); track category.categoryId){
        <section [attr.data-category-id]="category.categoryId">
          <h2
            class="section-title"
            [attr.data-category-id]="category.categoryId">
            {{ category.categoryName }}
          </h2>

          @for (producto of category.products; track producto.id){
            <app-product-card
              [product]="producto">
            </app-product-card>
          }
        </section>
      }

    </main>
  </div>

</div>
