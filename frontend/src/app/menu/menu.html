<div class="principal-container">

  <header class="head">
    <img src="../../../assets/logo.png" alt="logo">
    <button class="return-button">&lt;</button>
    <div class="image-logo"></div>
  </header>

  <div class="body-menu">

    <aside class="category-column">
      @for(category of menuCategories(); track category.categoriaId){
        <button class="category-btn"
          [class.active]="selectedCategory === category.categoriaId"
          (click)="scrollToCategory(category.categoriaId)">
          {{ category.categoriaNombre }}
        </button>
      }
      <button class="send-order-btn" (click)="sendOrder()">
        Send Order
        @if(orderService.totalItems() > 0) {
          <span class="cart-count">{{ orderService.totalItems() }}</span>
        }
      </button>
      <button class="show-order-btn" routerLink="/summary">
        show order

        @if (orderService.totalItems() > 0) {
          <span class="cart-count">{{ orderService.totalItems() }}</span>
        }
      </button>
      <button class="waiter-view-btn" (click)="navigateToPedido()">
        Vista Camarero
      </button>
    </aside>

    <main class="product-column"
      #productColumn
      (scroll)="onScroll($event)">

      @for (category of menuCategories(); track category.categoriaId){
        <section [attr.data-category-id]="category.categoriaId">
          <h2
            class="section-title"
            [attr.data-category-id]="category.categoriaId">
            {{ category.categoriaNombre }}
          </h2>

          @for (p of category.productos; track p.id){
            <app-product-card
              [product]="p">
            </app-product-card>
          }
        </section>
      }

    </main>
  </div>

</div>
