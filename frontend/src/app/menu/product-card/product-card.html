<div class="product-card">
  <img [src]="product.picture" alt="Foto de {{ product.name }}" class="dish-image">

  <div class="product-info">
    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>
    <span class="price"> {{ product.price }} €</span>
  </div>

  <button class="add-btn" (click)="onAddClick()">+</button>
</div>
