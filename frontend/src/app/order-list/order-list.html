<header class="head">
  <img src="../../../assets/logo.png" alt="logo">
  <button class="return-button" routerLink="/">&lt;</button>
  <div class="image-logo"></div>
</header>

<div class="summary-wrapper">

  <div class="summary-container">

    <h2>Tu pedido</h2>

    @for (item of orderService.order; track item.product.id){

      <div class="summary-card">
        <img [src]="item.product.picture" alt="foto de {{ item.product.name }}">

        <div class="product-info">
          <h3>{{ item.product.name }}</h3>
          <p>{{ item.product.description }}</p>

          <button class="edit-btn">editar</button>
        </div>

        <div class="right-zone">
          <span class="price">{{ item.product.price }} €</span>

          <div class="total-buttons">
            <button class="btn-circle" (click)="decrement(item.product)">-</button>
            <span class="quantity">{{ item.quantity }}</span>
            <button class="btn-circle" (click)="increment(item.product)">+</button>
          </div>
        </div>
      </div>
    }

    <app-pedido
      [productosSeleccionados]="obtenerIdsParaComanda()"
      [isMenuView]="true">
    </app-pedido>

  </div>
</div>
